<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silver Klíma · Aláírás Template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Hanken Grotesk', Arial, Helvetica, sans-serif;
      background: #F6F7F8;
      color: #1A1F22;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    button { font-family: inherit; }
    a { color: inherit; }
    input:focus {
      border-color: #7BCBD3 !important;
      box-shadow: 0 0 0 3px rgba(123, 203, 211, 0.25);
    }
    button:hover {
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(0) scale(0.99);
    }
    button[style*="border: 1.5px solid rgb(228, 231, 233)"]:hover,
    button[style*="border: 1.5px solid #E4E7E9"]:hover {
      border-color: #7BCBD3 !important;
      color: #1A1F22 !important;
    }
    .sk-sig-preview a { text-decoration: none; }

    ol { counter-reset: step; list-style: none; padding-left: 0; }
    ol > li {
      counter-increment: step;
      position: relative;
      padding-left: 28px;
    }
    ol > li::before {
      content: counter(step, decimal-leading-zero);
      position: absolute;
      left: 0;
      top: 1px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      color: #0E7C8C;
      font-weight: 500;
    }
    ol > li > strong {
      color: #1A1F22;
      font-weight: 600;
    }
    ol > li > em {
      color: #1A1F22;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="react">
    // =====================================================================
    // signatures.jsx — Outlook-safe email signature generators
    // =====================================================================

    const FONT = "'Hanken Grotesk', Arial, Helvetica, sans-serif";
    const MONO = "'JetBrains Mono', 'Consolas', 'Courier New', monospace";

    const COLORS = {
      ink: '#1A1F22',
      silver: '#6B6B6B',
      mist: '#C5C7CA',
      line: '#E4E7E9',
      // Greens are kept for the Zöld Település banner artwork only.
      // The studio chrome and the signature output use the blue brand accent below.
      green: '#22c55e',
      greenDeep: '#15803d',
      greenDark: '#14532d',
      greenInk:  '#052e16',
      greenSoft: '#dcfce7',
      // Brand accent (Silver Klíma blue). Used for:
      //   - All studio chrome (section tags, active tile, italic headline word, step counter)
      //   - All line decorations inside the signature (website underline + Editorial bar)
      accent:     '#7BCBD3',
      accentDeep: '#0E7C8C',
      accentSoft: '#CDEAEE',
      bg: '#FFFFFF',
    };

    // The studio is hosted on GitHub Pages; the production URLs point at
    // that origin so the "HTML kód" export resolves images everywhere.
    // When the assets are eventually moved under silverklima.hu/email/,
    // change ASSET_BASE below and republish.
    const ASSET_BASE = 'https://peggipalasics.github.io/silverklima-alairas';

    // Per-banner `href` decides where the click goes from the email:
    //   - Zöld Település banners (varosi, foldgomb, napsutes) → zoldtelepules.hu
    //   - Általános banners (csovekSotet, csovekVilagos)      → silverklima.hu
    const HREF_ZOLD   = 'https://www.zoldtelepules.hu';
    const HREF_SILVER = 'https://silverklima.hu';
    const ALT_ZOLD   = '1 klíma = 1 fa — Zöld Település Program · zoldtelepules.hu';
    const ALT_SILVER = 'Silver Klíma — Klíma · Hőszivattyú · Légtechnika · Épületgépészet · silverklima.hu';

    const BANNERS = {
      varosi: {
        label: 'Városi · Zöld Település',
        subtitle: 'Illusztráció — emberek faültetés közben, animált',
        preview: 'assets/banner-varosi.gif',
        production: `${ASSET_BASE}/assets/banner-varosi.gif`,
        href: HREF_ZOLD,
        alt: ALT_ZOLD,
        w: 520, h: 104,
      },
      foldgomb: {
        label: 'Földgömb · Zöld Település',
        subtitle: 'Illusztráció — földgömb és növények, animált',
        preview: 'assets/banner-foldgomb.gif',
        production: `${ASSET_BASE}/assets/banner-foldgomb.gif`,
        href: HREF_ZOLD,
        alt: ALT_ZOLD,
        w: 520, h: 104,
      },
      napsutes: {
        label: 'Napsütés · Zöld Település',
        subtitle: 'Fotó — napsütés a lombkoronán át, animált',
        preview: 'assets/banner-napsutes.gif',
        production: `${ASSET_BASE}/assets/banner-napsutes.gif`,
        href: HREF_ZOLD,
        alt: ALT_ZOLD,
        w: 520, h: 104,
      },
      csovekSotet: {
        label: 'Csövek (sötét) · Általános',
        subtitle: 'Fotó — fémcsövek sötét háttéren, animált',
        preview: 'assets/banner-csovek-sotet.gif',
        production: `${ASSET_BASE}/assets/banner-csovek-sotet.gif`,
        href: HREF_SILVER,
        alt: ALT_SILVER,
        w: 520, h: 104,
      },
      csovekVilagos: {
        label: 'Csövek (világos) · Általános',
        subtitle: 'Fotó — fémcsövek világos háttéren, animált',
        preview: 'assets/banner-csovek-vilagos.gif',
        production: `${ASSET_BASE}/assets/banner-csovek-vilagos.gif`,
        href: HREF_SILVER,
        alt: ALT_SILVER,
        w: 520, h: 104,
      },
    };

    const DEFAULT_BANNER = 'varosi';

    const esc = (s) =>
      String(s ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');

    const telHref = (phone) => 'tel:' + String(phone || '').replace(/[^\d+]/g, '');

    const ensureHttp = (url) => {
      const u = String(url || '').trim();
      if (!u) return '';
      if (/^https?:\/\//i.test(u)) return u;
      return 'https://' + u.replace(/^\/+/, '');
    };

    const stripProto = (url) =>
      String(url || '')
        .replace(/^https?:\/\//i, '')
        .replace(/\/$/, '');

    function bannerImage(urls, width) {
      const key = (urls && urls.bannerKey) || DEFAULT_BANNER;
      const asset = BANNERS[key] || BANNERS[DEFAULT_BANNER];
      const useProduction = !!(urls && urls.production);
      const src  = useProduction ? asset.production : asset.preview;
      const href = asset.href || HREF_SILVER;
      const alt  = asset.alt  || '';
      const w = width || asset.w;
      const h = Math.round(asset.h * (w / asset.w));
      return `
<a href="${esc(href)}" style="text-decoration: none; border: 0; display: inline-block;">
  <img src="${esc(src)}" width="${w}" height="${h}" alt="${esc(alt)}" style="display: block; border: 0; outline: none; text-decoration: none; width: ${w}px; height: ${h}px; max-width: 100%;">
</a>`.trim();
    }

    function positionLine(position, size = 13, italic = false) {
      if (!position || !String(position).trim()) return '';
      const fs = italic ? 'italic' : 'normal';
      const fw = italic ? '500' : '400';
      return `<div style="font-family: ${FONT}; font-style: ${fs}; font-weight: ${fw}; font-size: ${size}px; color: ${COLORS.silver}; line-height: 1.35; margin-top: 2px; mso-line-height-rule: exactly;">${esc(position)}</div>`;
    }

    // ---- Variant 1: Klasszikus ----
    function buildClassic(data, urls) {
      const { name, position, phone, email, website } = data;
      const site = stripProto(website) || 'silverklima.hu';
      const siteHref = ensureHttp(website || 'silverklima.hu');

      return `
<table cellpadding="0" cellspacing="0" border="0" role="presentation" style="font-family: ${FONT}; color: ${COLORS.ink}; border-collapse: collapse;">
  <tr>
    <td style="padding: 0 0 14px 0; vertical-align: top;">
      <table cellpadding="0" cellspacing="0" border="0" role="presentation">
        <tr>
          <td style="padding: 2px 22px 0 0; vertical-align: top; border-right: 1px solid ${COLORS.line};">
            <img src="${esc(urls.logo)}" width="148" height="61" alt="Silver Klíma" style="display: block; border: 0; outline: none; text-decoration: none; width: 148px; height: 61px;">
          </td>
          <td style="padding: 0 0 0 22px; vertical-align: top;">
            <div style="font-family: ${FONT}; font-size: 17px; font-weight: 700; color: ${COLORS.ink}; letter-spacing: -0.012em; line-height: 1.2; mso-line-height-rule: exactly;">${esc(name)}</div>
            ${positionLine(position, 13)}
            <div style="height: 10px; line-height: 10px; font-size: 10px;">&nbsp;</div>
            <div style="font-family: ${FONT}; font-size: 13px; line-height: 1.7; color: ${COLORS.ink}; mso-line-height-rule: exactly;">
              <a href="${telHref(phone)}" style="color: ${COLORS.ink}; text-decoration: none;">${esc(phone)}</a><br>
              <a href="mailto:${esc(email)}" style="color: ${COLORS.ink}; text-decoration: none;">${esc(email)}</a>
              <span style="color: ${COLORS.mist};">&nbsp;·&nbsp;</span>
              <a href="${esc(siteHref)}" style="color: ${COLORS.ink}; text-decoration: none;">${esc(site)}</a>
            </div>
          </td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td>
      ${bannerImage(urls, 520)}
    </td>
  </tr>
</table>`.trim();
    }

    // ---- Variant 2: Editorial ----
    // "Üdvözlettel," greeting (so user doesn't retype it), then name first
    // (big, with period), italic position, blue accent bar, single-line
    // contact row, then logo + badge (moved up, above the banner), then the
    // banner at the very bottom.
    function buildEditorial(data, urls) {
      const { name, position, phone, email, website } = data;
      const site = stripProto(website) || 'silverklima.hu';
      const siteHref = ensureHttp(website || 'silverklima.hu');
      const nameWithDot = String(name || '').trim().replace(/\.$/, '') + '.';

      return `
<table cellpadding="0" cellspacing="0" border="0" role="presentation" style="font-family: ${FONT}; color: ${COLORS.ink}; border-collapse: collapse;">
  <tr>
    <td style="font-family: ${FONT}; font-size: 14px; line-height: 1.5; color: ${COLORS.ink}; padding: 0 0 14px 0; mso-line-height-rule: exactly;">Üdvözlettel,</td>
  </tr>
  <tr>
    <td style="padding: 0;">
      <div style="font-family: ${FONT}; font-size: 22px; font-weight: 800; color: ${COLORS.ink}; letter-spacing: -0.025em; line-height: 1.05; mso-line-height-rule: exactly;">${esc(nameWithDot)}</div>
      ${positionLine(position, 13, true)}
    </td>
  </tr>
  <tr>
    <td style="padding: 10px 0 10px 0;">
      <table cellpadding="0" cellspacing="0" border="0" role="presentation" style="border-collapse: separate;">
        <tr>
          <td width="28" height="2" style="width: 28px; height: 2px; background-color: ${COLORS.accent}; font-size: 0; line-height: 0; mso-line-height-rule: exactly;">&nbsp;</td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td style="padding: 0 0 14px 0;">
      <div style="font-family: ${FONT}; font-size: 13px; line-height: 1.5; color: ${COLORS.ink}; mso-line-height-rule: exactly;">
        <a href="${telHref(phone)}" style="color: ${COLORS.ink}; text-decoration: none; font-weight: 500;">${esc(phone)}</a>
        <span style="color: ${COLORS.mist};">&nbsp;&nbsp;·&nbsp;&nbsp;</span>
        <a href="mailto:${esc(email)}" style="color: ${COLORS.ink}; text-decoration: none;">${esc(email)}</a>
        <span style="color: ${COLORS.mist};">&nbsp;&nbsp;·&nbsp;&nbsp;</span>
        <a href="${esc(siteHref)}" style="color: ${COLORS.ink}; text-decoration: none;">${esc(site)}</a>
      </div>
    </td>
  </tr>
  <tr>
    <td style="padding: 0 0 10px 0;">
      <table cellpadding="0" cellspacing="0" border="0" role="presentation" style="border-collapse: collapse;">
        <tr>
          <td style="padding: 0 14px 0 0; vertical-align: middle;">
            <img src="${esc(urls.logo)}" width="96" height="40" alt="Silver Klíma" style="display: block; border: 0; outline: none; text-decoration: none; width: 96px; height: 40px;">
          </td>
          <td style="padding: 0; vertical-align: middle;">
            <img src="${esc(urls.badge)}" width="56" height="55" alt="GYMSM Kamara által ajánlott vállalkozás 2026" title="GYMSM Kamara által ajánlott vállalkozás 2026" style="display: block; border: 0; outline: none; text-decoration: none; width: 56px; height: 55px;">
          </td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td style="padding: 0;">
      ${bannerImage(urls, 520)}
    </td>
  </tr>
</table>`.trim();
    }

    // ---- Variant 3: Kompakt ----
    // Logo on the left; name + (optional) position stacked vertically on the
    // right; T/E/W labelled contact rows below; narrow banner at the bottom.
    function buildCompact(data, urls) {
      const { name, position, phone, email, website } = data;
      const site = stripProto(website) || 'silverklima.hu';
      const siteHref = ensureHttp(website || 'silverklima.hu');

      return `
<table cellpadding="0" cellspacing="0" border="0" role="presentation" style="font-family: ${FONT}; color: ${COLORS.ink}; border-collapse: collapse;">
  <tr>
    <td style="font-family: ${FONT}; font-size: 14px; line-height: 1.5; color: ${COLORS.ink}; padding: 0 0 12px 0; mso-line-height-rule: exactly;">Üdvözlettel,</td>
  </tr>
  <tr>
    <td style="padding: 0 0 12px 0; vertical-align: top;">
      <table cellpadding="0" cellspacing="0" border="0" role="presentation">
        <tr>
          <td style="padding: 0 18px 0 0; vertical-align: top;">
            <img src="${esc(urls.logo)}" width="104" height="43" alt="Silver Klíma" style="display: block; border: 0; outline: none; text-decoration: none; width: 104px; height: 43px;">
            <div style="height: 8px; line-height: 8px; font-size: 8px;">&nbsp;</div>
            <img src="${esc(urls.badge)}" width="72" height="70" alt="GYMSM Kamara által ajánlott vállalkozás 2026" title="GYMSM Kamara által ajánlott vállalkozás 2026" style="display: block; border: 0; outline: none; text-decoration: none; width: 72px; height: 70px;">
          </td>
          <td style="padding: 0; vertical-align: top;">
            <div style="font-family: ${FONT}; font-size: 14px; font-weight: 700; color: ${COLORS.ink}; line-height: 1.25; mso-line-height-rule: exactly; letter-spacing: -0.005em;">${esc(name)}</div>
            ${positionLine(position, 12)}
            <div style="height: 8px; line-height: 8px; font-size: 8px;">&nbsp;</div>
            <table cellpadding="0" cellspacing="0" border="0" role="presentation" style="border-collapse: collapse;">
              <tr>
                <td style="padding: 0 8px 0 0; vertical-align: top;">
                  <span style="font-family: ${MONO}; font-size: 10px; color: ${COLORS.silver}; letter-spacing: 0.12em; text-transform: uppercase;">T</span>
                </td>
                <td style="padding: 0; vertical-align: top;">
                  <a href="${telHref(phone)}" style="font-family: ${FONT}; font-size: 13px; color: ${COLORS.ink}; text-decoration: none; line-height: 1.5;">${esc(phone)}</a>
                </td>
              </tr>
              <tr>
                <td style="padding: 0 8px 0 0; vertical-align: top;">
                  <span style="font-family: ${MONO}; font-size: 10px; color: ${COLORS.silver}; letter-spacing: 0.12em; text-transform: uppercase;">E</span>
                </td>
                <td style="padding: 0; vertical-align: top;">
                  <a href="mailto:${esc(email)}" style="font-family: ${FONT}; font-size: 13px; color: ${COLORS.ink}; text-decoration: none; line-height: 1.5;">${esc(email)}</a>
                </td>
              </tr>
              <tr>
                <td style="padding: 0 8px 0 0; vertical-align: top;">
                  <span style="font-family: ${MONO}; font-size: 10px; color: ${COLORS.silver}; letter-spacing: 0.12em; text-transform: uppercase;">W</span>
                </td>
                <td style="padding: 0; vertical-align: top;">
                  <a href="${esc(siteHref)}" style="font-family: ${FONT}; font-size: 13px; color: ${COLORS.ink}; text-decoration: none; line-height: 1.5;">${esc(site)}</a>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td>
      ${bannerImage(urls, 420)}
    </td>
  </tr>
</table>`.trim();
    }

    // ---- Variant 4: Kártya ----
    function buildCard(data, urls) {
      const { name, position, phone, email, website } = data;
      const site = stripProto(website) || 'silverklima.hu';
      const siteHref = ensureHttp(website || 'silverklima.hu');

      return `
<table cellpadding="0" cellspacing="0" border="0" width="540" role="presentation" style="font-family: ${FONT}; color: ${COLORS.ink}; border-collapse: separate; border: 1px solid ${COLORS.line}; border-radius: 14px; background-color: #FFFFFF; overflow: hidden;">
  <tr>
    <td style="padding: 20px 22px 4px 22px; vertical-align: top;">
      <table cellpadding="0" cellspacing="0" border="0" role="presentation" style="border-collapse: collapse;">
        <tr>
          <td style="padding: 0 22px 0 0; vertical-align: middle;">
            <img src="${esc(urls.logo)}" width="118" height="49" alt="Silver Klíma" style="display: block; border: 0; outline: none; text-decoration: none; width: 118px; height: 49px;">
          </td>
          <td style="padding: 0; vertical-align: middle;">
            <div style="font-family: ${FONT}; font-size: 16px; font-weight: 700; color: ${COLORS.ink}; letter-spacing: -0.012em; line-height: 1.2; mso-line-height-rule: exactly;">${esc(name)}</div>
            ${positionLine(position, 12)}
          </td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td style="padding: 12px 22px 18px 22px;">
      <table cellpadding="0" cellspacing="0" border="0" width="100%" role="presentation" style="border-top: 1px solid ${COLORS.line}; border-collapse: collapse;">
        <tr>
          <td style="padding: 12px 0 0 0;">
            <div style="font-family: ${FONT}; font-size: 13px; line-height: 1.85; color: ${COLORS.ink}; mso-line-height-rule: exactly;">
              <span style="font-family: ${MONO}; font-size: 10px; color: ${COLORS.silver}; letter-spacing: 0.14em; text-transform: uppercase;">TEL</span>
              &nbsp;&nbsp;
              <a href="${telHref(phone)}" style="color: ${COLORS.ink}; text-decoration: none;">${esc(phone)}</a>
              <br>
              <span style="font-family: ${MONO}; font-size: 10px; color: ${COLORS.silver}; letter-spacing: 0.14em; text-transform: uppercase;">MAIL</span>
              &nbsp;
              <a href="mailto:${esc(email)}" style="color: ${COLORS.ink}; text-decoration: none;">${esc(email)}</a>
              <br>
              <span style="font-family: ${MONO}; font-size: 10px; color: ${COLORS.silver}; letter-spacing: 0.14em; text-transform: uppercase;">WEB</span>
              &nbsp;&nbsp;
              <a href="${esc(siteHref)}" style="color: ${COLORS.ink}; text-decoration: none;">${esc(site)}</a>
            </div>
          </td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td style="padding: 0; font-size: 0; line-height: 0;">
      ${bannerImage(urls, 540)}
    </td>
  </tr>
</table>`.trim();
    }

    function buildPlain(data) {
      const { name, position, phone, email, website } = data;
      const site = stripProto(website) || 'silverklima.hu';
      const lines = [
        'Üdvözlettel,',
        '',
        name,
        position && position.trim() ? position : null,
        '— Silver Klíma —',
        phone,
        email,
        site,
        '',
        '✦ 1 klíma = 1 fa — Zöld Település Program · zoldtelepules.hu',
      ].filter((l) => l !== null && l !== undefined);
      return lines.join('\n');
    }

    const VARIANTS = [
      { id: 'editorial', label: 'Editorial',  subtitle: 'Magazinos — név elöl, hangsúlysáv, kontakt, logó, banner', build: buildEditorial },
      { id: 'compact',   label: 'Kompakt',    subtitle: 'Logó balra, név + pozíció, T/E/W címkés sorok, banner',    build: buildCompact },
    ];

    // =====================================================================
    // app.jsx — studio UI
    // =====================================================================

    const { useState, useMemo, useCallback, useEffect, useRef } = React;

    const STORAGE_KEY = 'silverklima.signature.v1';

    const DEFAULT_DATA = {
      name: 'Kovács Péter',
      position: 'értékesítési munkatárs',
      phone: '+36 30 123 4567',
      email: 'peter@silverklima.hu',
      website: 'silverklima.hu',
    };

    const LOGO_PRODUCTION  = `${ASSET_BASE}/assets/logo-silverklima.png`;
    const LOGO_PREVIEW     = 'assets/logo-silverklima.png';
    // GYMSM Kamara által ajánlott vállalkozás 2026 védjegy
    const BADGE_PRODUCTION = `${ASSET_BASE}/assets/badge-kik-2026.png`;
    const BADGE_PREVIEW    = 'assets/badge-kik-2026.png';

    function buildUrls(bannerKey, { production = false } = {}) {
      return {
        logo:  production ? LOGO_PRODUCTION  : LOGO_PREVIEW,
        badge: production ? BADGE_PRODUCTION : BADGE_PREVIEW,
        bannerKey,
        production,
      };
    }

    async function copyRich(html, plain) {
      try {
        if (window.ClipboardItem && navigator.clipboard?.write) {
          const item = new ClipboardItem({
            'text/html': new Blob([html], { type: 'text/html' }),
            'text/plain': new Blob([plain], { type: 'text/plain' }),
          });
          await navigator.clipboard.write([item]);
          return true;
        }
      } catch (e) {}
      try {
        const div = document.createElement('div');
        div.contentEditable = 'true';
        div.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0;';
        div.innerHTML = html;
        document.body.appendChild(div);
        const range = document.createRange();
        range.selectNodeContents(div);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        const ok = document.execCommand('copy');
        sel.removeAllRanges();
        document.body.removeChild(div);
        return ok;
      } catch (e) { return false; }
    }

    async function copyText(text) {
      try { await navigator.clipboard.writeText(text); return true; }
      catch (e) { return false; }
    }

    function Field({ label, value, onChange, placeholder, optional, type = 'text' }) {
      return (
        <label style={fieldStyles.wrap}>
          <span style={fieldStyles.label}>
            {label}
            {optional && <span style={fieldStyles.opt}> · opcionális</span>}
          </span>
          <input
            type={type}
            value={value}
            onChange={(e) => onChange(e.target.value)}
            placeholder={placeholder}
            style={fieldStyles.input}
          />
        </label>
      );
    }

    const fieldStyles = {
      wrap: { display: 'flex', flexDirection: 'column', gap: 6, minWidth: 0 },
      label: { fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase', color: COLORS.silver, fontWeight: 500 },
      opt: { color: COLORS.mist, textTransform: 'none', letterSpacing: '0.02em', fontWeight: 400 },
      input: { fontFamily: "'Hanken Grotesk', Arial, Helvetica, sans-serif", fontSize: 14, color: COLORS.ink, padding: '10px 12px', border: `1px solid ${COLORS.line}`, borderRadius: 8, background: '#fff', outline: 'none', width: '100%', boxSizing: 'border-box', letterSpacing: '-0.005em' },
    };

    function VariantCard({ variant, data, bannerKey, focus }) {
      const [richState, setRichState] = useState('idle');
      const [rawState, setRawState] = useState('idle');
      const previewRef = useRef(null);

      const previewHTML = useMemo(
        () => variant.build(data, buildUrls(bannerKey, { production: false })),
        [data, variant, bannerKey],
      );
      const productionHTML = useMemo(
        () => variant.build(data, buildUrls(bannerKey, { production: true })),
        [data, variant, bannerKey],
      );

      const handleRich = useCallback(async () => {
        const previewEl = previewRef.current;
        const html = previewEl ? previewEl.innerHTML : previewHTML;
        const ok = await copyRich(html, buildPlain(data));
        setRichState(ok ? 'done' : 'err');
        setTimeout(() => setRichState('idle'), 1800);
      }, [previewHTML, data]);

      const handleRaw = useCallback(async () => {
        const ok = await copyText(productionHTML);
        setRawState(ok ? 'done' : 'err');
        setTimeout(() => setRawState('idle'), 1800);
      }, [productionHTML]);

      return (
        <div style={cardStyles.card}>
          <div style={cardStyles.header}>
            <div>
              <div style={cardStyles.label}>{variant.label}</div>
              <div style={cardStyles.subtitle}>{variant.subtitle}</div>
            </div>
            <div style={cardStyles.tag}>/ {String(variant.id).padStart(2, '0')}</div>
          </div>

          <div style={cardStyles.surface}>
            <div style={cardStyles.surfaceInner}>
              <div style={cardStyles.emailMeta}>
                <span style={cardStyles.emailMetaKey}>Tárgy</span>
                <span style={cardStyles.emailMetaVal}>Visszaigazolás · felmérés időpont</span>
              </div>
              <div
                ref={previewRef}
                className="sk-sig-preview"
                dangerouslySetInnerHTML={{ __html: previewHTML }}
              />
            </div>
          </div>

          <div style={cardStyles.actions}>
            <button
              type="button"
              onClick={handleRich}
              style={{ ...cardStyles.btnPrimary, ...(richState === 'done' ? cardStyles.btnPrimaryDone : null) }}
            >
              {richState === 'done' ? '✓ Vágólapon — beilleszthető' : richState === 'err' ? 'Hiba — próbáld a HTML-t' : 'Másolás Outlookba'}
            </button>
            <button type="button" onClick={handleRaw} style={cardStyles.btnGhost}>
              {rawState === 'done' ? '✓ HTML' : rawState === 'err' ? 'Hiba' : 'HTML kód'}
            </button>
            <button type="button" onClick={() => focus(variant.id)} style={cardStyles.btnIcon} aria-label="Nagy nézet" title="Nagy nézet">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="3 6 3 3 6 3"></polyline>
                <polyline points="13 6 13 3 10 3"></polyline>
                <polyline points="3 10 3 13 6 13"></polyline>
                <polyline points="13 10 13 13 10 13"></polyline>
              </svg>
            </button>
          </div>
        </div>
      );
    }

    const cardStyles = {
      card: { background: '#fff', border: `1px solid ${COLORS.line}`, borderRadius: 20, padding: 22, display: 'flex', flexDirection: 'column', gap: 14 },
      header: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12 },
      label: { fontFamily: "'Hanken Grotesk', sans-serif", fontSize: 18, fontWeight: 700, color: COLORS.ink, letterSpacing: '-0.015em' },
      subtitle: { fontFamily: "'Hanken Grotesk', sans-serif", fontSize: 12.5, color: COLORS.silver, fontWeight: 400, marginTop: 2, letterSpacing: '-0.005em' },
      tag: { fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: '0.14em', color: COLORS.mist, fontWeight: 500, paddingTop: 4 },
      surface: { background: '#F8F9FA', borderRadius: 12, padding: 18, minHeight: 220 },
      surfaceInner: { background: '#fff', borderRadius: 8, padding: '16px 20px 20px', border: `1px solid ${COLORS.line}` },
      emailMeta: { display: 'flex', gap: 14, paddingBottom: 10, marginBottom: 14, borderBottom: `1px dashed ${COLORS.line}`, fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: '0.12em', textTransform: 'uppercase' },
      emailMetaKey: { color: COLORS.mist },
      emailMetaVal: { color: COLORS.silver, textTransform: 'none', letterSpacing: '0.02em', fontFamily: "'Hanken Grotesk', sans-serif", fontSize: 12 },
      emailBody: { fontFamily: "'Hanken Grotesk', sans-serif", fontSize: 13, color: COLORS.silver, marginBottom: 18 },
      actions: { display: 'flex', gap: 8, alignItems: 'center' },
      btnPrimary: { flex: '1 1 auto', fontFamily: "'Hanken Grotesk', sans-serif", fontSize: 13, fontWeight: 600, color: '#fff', background: COLORS.ink, border: 0, borderRadius: 999, padding: '11px 18px', cursor: 'pointer', letterSpacing: '-0.005em', transition: 'background 0.2s, transform 0.15s' },
      btnPrimaryDone: { background: COLORS.accentDeep },
      btnGhost: { flex: '0 0 auto', fontFamily: "'Hanken Grotesk', sans-serif", fontSize: 13, fontWeight: 500, color: COLORS.ink, background: '#fff', border: `1.5px solid ${COLORS.line}`, borderRadius: 999, padding: '9.5px 14px', cursor: 'pointer', letterSpacing: '-0.005em', transition: 'border-color 0.2s, color 0.2s' },
      btnIcon: { flex: '0 0 auto', width: 36, height: 36, borderRadius: 999, border: `1.5px solid ${COLORS.line}`, background: '#fff', color: COLORS.silver, cursor: 'pointer', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', transition: 'border-color 0.2s, color 0.2s' },
    };

    function FocusOverlay({ variant, data, bannerKey, onClose }) {
      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        document.body.style.overflow = 'hidden';
        return () => {
          window.removeEventListener('keydown', onKey);
          document.body.style.overflow = '';
        };
      }, [onClose]);

      if (!variant) return null;
      const html = variant.build(data, buildUrls(bannerKey));

      return (
        <div style={focusStyles.scrim} onClick={onClose}>
          <div style={focusStyles.wrap} onClick={(e) => e.stopPropagation()}>
            <div style={focusStyles.bar}>
              <div>
                <div style={focusStyles.barLabel}>{variant.label}</div>
                <div style={focusStyles.barSub}>{variant.subtitle}</div>
              </div>
              <button onClick={onClose} style={focusStyles.close} aria-label="Bezárás">×</button>
            </div>
            <div style={focusStyles.frame}>
              <div style={focusStyles.email}>
                <div style={cardStyles.emailMeta}>
                  <span style={cardStyles.emailMetaKey}>Tárgy</span>
                  <span style={cardStyles.emailMetaVal}>Visszaigazolás · felmérés időpont</span>
                </div>
                <div style={{ ...cardStyles.emailBody, fontSize: 14, marginBottom: 24 }}>
                  <span style={{ color: COLORS.silver }}>Kedves Anna,</span>
                  <br /><br />
                  <span style={{ color: COLORS.silver }}>Köszönöm a visszajelzést — a felmérést a jövő héten csütörtökön 14:00-kor be tudjuk illeszteni.</span>
                </div>
                <div dangerouslySetInnerHTML={{ __html: html }} />
              </div>
            </div>
          </div>
        </div>
      );
    }

    const focusStyles = {
      scrim: { position: 'fixed', inset: 0, background: 'rgba(26,31,34,0.65)', backdropFilter: 'blur(8px)', zIndex: 100, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 32 },
      wrap: { width: '100%', maxWidth: 880, maxHeight: '92vh', display: 'flex', flexDirection: 'column', background: '#fff', borderRadius: 20, overflow: 'hidden', boxShadow: '0 24px 80px rgba(0,0,0,0.3)' },
      bar: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '18px 24px', borderBottom: `1px solid ${COLORS.line}` },
      barLabel: { fontFamily: "'Hanken Grotesk', sans-serif", fontSize: 18, fontWeight: 700, color: COLORS.ink, letterSpacing: '-0.015em' },
      barSub: { fontFamily: "'Hanken Grotesk', sans-serif", fontSize: 12.5, color: COLORS.silver, marginTop: 2 },
      close: { width: 36, height: 36, borderRadius: 999, border: `1.5px solid ${COLORS.line}`, background: '#fff', color: COLORS.ink, fontSize: 20, lineHeight: 1, cursor: 'pointer' },
      frame: { background: '#F8F9FA', padding: 40, flex: '1 1 auto', overflow: 'auto' },
      email: { background: '#fff', borderRadius: 10, padding: '28px 36px 36px', maxWidth: 640, margin: '0 auto', border: `1px solid ${COLORS.line}` },
    };

    function BannerPicker({ active, onSelect }) {
      const keys = Object.keys(BANNERS);
      return (
        <section style={pickerStyles.card}>
          <div style={pickerStyles.head}>
            <span style={appStyles.sectionTag}>◉ BANNER STÍLUS · 05</span>
            <span style={pickerStyles.hint}>
              A választott banner mindkét aláírás-változatban élesben fog megjelenni.
            </span>
          </div>
          <div style={pickerStyles.row}>
            {keys.map((k) => {
              const b = BANNERS[k];
              const isActive = k === active;
              return (
                <button
                  key={k}
                  type="button"
                  onClick={() => onSelect(k)}
                  style={{ ...pickerStyles.tile, ...(isActive ? pickerStyles.tileActive : null) }}
                >
                  <div style={pickerStyles.thumbWrap}>
                    <img src={b.preview} alt={b.label} style={pickerStyles.thumb} draggable={false} />
                    {isActive && <span style={pickerStyles.checkChip}>✓</span>}
                  </div>
                  <div style={pickerStyles.tileMeta}>
                    <div style={pickerStyles.tileLabel}>{b.label}</div>
                    <div style={pickerStyles.tileSub}>{b.subtitle}</div>
                  </div>
                </button>
              );
            })}
          </div>
        </section>
      );
    }

    const pickerStyles = {
      card: { background: '#fff', border: `1px solid ${COLORS.line}`, borderRadius: 20, padding: 28, display: 'flex', flexDirection: 'column', gap: 18 },
      head: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 12, flexWrap: 'wrap' },
      hint: { fontSize: 13, color: COLORS.silver, fontStyle: 'italic' },
      row: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 12 },
      tile: { display: 'flex', flexDirection: 'column', gap: 10, padding: 10, background: '#fff', border: `1.5px solid ${COLORS.line}`, borderRadius: 14, cursor: 'pointer', textAlign: 'left', transition: 'border-color 0.15s, box-shadow 0.15s, transform 0.15s' },
      tileActive: { borderColor: COLORS.accent, boxShadow: `0 0 0 3px ${COLORS.accentSoft}, 0 6px 18px rgba(123,203,211,0.18)` },
      thumbWrap: { position: 'relative', width: '100%', aspectRatio: '5 / 1', background: '#f5f4ee', borderRadius: 8, overflow: 'hidden' },
      thumb: { width: '100%', height: '100%', objectFit: 'cover', display: 'block' },
      checkChip: { position: 'absolute', top: 6, right: 6, width: 22, height: 22, borderRadius: 999, background: COLORS.accent, color: '#fff', fontSize: 12, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 2px 6px rgba(0,0,0,0.18)' },
      tileMeta: { padding: '0 4px 4px 4px' },
      tileLabel: { fontFamily: "'Hanken Grotesk', sans-serif", fontSize: 14, fontWeight: 700, color: COLORS.ink, letterSpacing: '-0.005em' },
      tileSub: { fontFamily: "'Hanken Grotesk', sans-serif", fontSize: 11.5, color: COLORS.silver, marginTop: 2, lineHeight: 1.35 },
    };

    function loadStored() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === 'object' ? parsed : null;
      } catch (e) { return null; }
    }

    function App() {
      const stored = useMemo(() => loadStored(), []);
      const [data, setData] = useState(stored?.data || DEFAULT_DATA);
      const [focusId, setFocusId] = useState(null);
      const [bannerKey, setBannerKey] = useState(
        stored?.bannerKey && BANNERS[stored.bannerKey] ? stored.bannerKey : DEFAULT_BANNER
      );
      const set = (k) => (v) => setData((d) => ({ ...d, [k]: v }));

      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ data, bannerKey }));
        } catch (e) {}
      }, [data, bannerKey]);

      const focusVariant = useMemo(() => VARIANTS.find((v) => v.id === focusId), [focusId]);

      return (
        <div style={appStyles.page}>
          <div style={appStyles.container}>
            <header style={appStyles.header}>
              <div style={appStyles.brand}>
                <img
                  src="assets/logo-silverklima.png"
                  alt="Silver Klíma"
                  style={{ height: 38, width: 'auto', display: 'block' }}
                />
                <span style={appStyles.brandTag}>
                  <span style={{ color: COLORS.mist }}>◌ </span>
                  EMAIL ALÁÍRÁS · TEMPLATE
                </span>
              </div>
              <div style={appStyles.headline}>
                <h1 style={appStyles.h1}>
                  Aláírás. Sablon.
                  <br />
                  <span style={appStyles.h1Italic}>Outlookba.</span>
                </h1>
                <p style={appStyles.lede}>
                  Töltsd ki egyszer, válassz változatot, másold a vágólapra.
                  Mindkettő table-alapú, beilleszthető Outlook Desktopba és Outlook Webbe.
                </p>
              </div>
            </header>

            <section style={appStyles.formCard}>
              <div style={appStyles.formHead}>
                <span style={appStyles.sectionTag}>✦ ADATOK</span>
                <span style={appStyles.formHint}>
                  A pozíció üresen is hagyható — a sablon enélkül is rendben néz ki.
                </span>
              </div>
              <div style={appStyles.formGrid}>
                <Field label="Név" value={data.name} onChange={set('name')} placeholder="Kovács Péter" />
                <Field label="Pozíció" value={data.position} onChange={set('position')} placeholder="értékesítési munkatárs" optional />
                <Field label="Telefon" value={data.phone} onChange={set('phone')} placeholder="+36 30 123 4567" />
                <Field label="Email" value={data.email} onChange={set('email')} placeholder="peter@silverklima.hu" type="email" />
                <Field label="Weboldal" value={data.website} onChange={set('website')} placeholder="silverklima.hu" />
              </div>
            </section>

            <BannerPicker active={bannerKey} onSelect={setBannerKey} />

            <section>
              <div style={appStyles.gridHead}>
                <span style={appStyles.sectionTag}>↻ VÁLTOZATOK · 02</span>
                <span style={appStyles.gridHint}>
                  Klikkelj a <strong style={{ color: COLORS.ink, fontWeight: 600 }}>Másolás Outlookba</strong> gombra, majd Outlookban illeszd be a vágólapot — <em>Desktop:</em> Fájl → Beállítások → Levél → Aláírások · <em>Web:</em> Beállítások → Fiók → Aláírás.
                </span>
              </div>
              <div style={appStyles.grid}>
                {VARIANTS.map((v) => (
                  <VariantCard key={v.id} variant={v} data={data} bannerKey={bannerKey} focus={setFocusId} />
                ))}
              </div>
            </section>

            <section style={appStyles.howto}>
              <div style={appStyles.howtoHead}>
                <span style={appStyles.sectionTag}>⌂ TELEPÍTÉS</span>
              </div>
              <ol style={appStyles.steps}>
                <li><strong>Töltsd ki</strong> fent a saját adataidat. Az előnézet azonnal frissül.</li>
                <li><strong>Másold</strong> a kiválasztott változatot a <em>Másolás Outlookba</em> gombbal.</li>
                <li>
                  <strong>Outlook Desktop:</strong> Fájl → Beállítások → Levél → Aláírások → Új → Ctrl+V → Mentés.
                  <br />
                  <strong>Outlook Web:</strong> Beállítások → Fiók → Aláírás → Ctrl+V → Mentés.
                </li>
                <li>
                  A <strong>logó</strong> az előnézetben a helyi képet használja. Outlookba másoláskor az aktuálisan megjelenő képet viszi át a vágólap. Ha nem jelenne meg, használd az <em>Aláírás-szerkesztőben</em> a <em>Kép beszúrása</em> gombot, és tedd be a Silver Klíma logót.
                </li>
                <li>
                  A <strong>HTML kód</strong> gombbal a forráskódot kapod meg (a képek a stúdió GitHub Pages-szervezéséről hivatkozva) — ezt használd, ha az Outlook aláírás-fájljába (.htm) közvetlenül szerkesztesz.
                </li>
              </ol>
            </section>

            <footer style={appStyles.footer}>
              <span>Silver Concept Kft. · Bútorgyári u. 1/b, 9027 Győr</span>
              <span style={{ color: COLORS.mist }}>·</span>
              <span>Silver Klíma · 2018 óta</span>
            </footer>
          </div>

          {focusVariant && (
            <FocusOverlay
              variant={focusVariant}
              data={data}
              bannerKey={bannerKey}
              onClose={() => setFocusId(null)}
            />
          )}
        </div>
      );
    }

    const appStyles = {
      page: { minHeight: '100vh', background: '#F6F7F8', fontFamily: "'Hanken Grotesk', sans-serif", color: COLORS.ink, padding: '48px 28px 80px' },
      container: { maxWidth: 1280, margin: '0 auto', display: 'flex', flexDirection: 'column', gap: 36 },
      header: { display: 'flex', flexDirection: 'column', gap: 28 },
      brand: { display: 'flex', alignItems: 'center', gap: 16 },
      brandTag: { fontFamily: "'JetBrains Mono', monospace", fontSize: 11, letterSpacing: '0.16em', color: COLORS.silver, fontWeight: 500, whiteSpace: 'nowrap' },
      headline: { display: 'flex', flexDirection: 'column', gap: 18, maxWidth: 760 },
      h1: { fontFamily: "'Hanken Grotesk', sans-serif", fontSize: 'clamp(40px, 5.6vw, 72px)', fontWeight: 800, lineHeight: 0.98, letterSpacing: '-0.035em', color: COLORS.ink, margin: 0 },
      h1Italic: { fontStyle: 'italic', fontWeight: 500, color: COLORS.accentDeep },
      lede: { fontFamily: "'Hanken Grotesk', sans-serif", fontSize: 17, lineHeight: 1.45, color: COLORS.silver, margin: 0, maxWidth: 580, textWrap: 'pretty' },
      sectionTag: { fontFamily: "'JetBrains Mono', monospace", fontSize: 11, letterSpacing: '0.16em', color: COLORS.accentDeep, fontWeight: 500, whiteSpace: 'nowrap' },
      formCard: { background: '#fff', border: `1px solid ${COLORS.line}`, borderRadius: 20, padding: 28, display: 'flex', flexDirection: 'column', gap: 18 },
      formHead: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 12, flexWrap: 'wrap' },
      formHint: { fontSize: 13, color: COLORS.silver, fontStyle: 'italic' },
      formGrid: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 16 },
      gridHead: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 16, marginBottom: 18, flexWrap: 'wrap' },
      gridHint: { fontSize: 13, color: COLORS.silver, maxWidth: 620, lineHeight: 1.5 },
      grid: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(420px, 1fr))', gap: 20 },
      howto: { background: '#fff', border: `1px solid ${COLORS.line}`, borderRadius: 20, padding: 28, display: 'flex', flexDirection: 'column', gap: 16 },
      howtoHead: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' },
      steps: { fontFamily: "'Hanken Grotesk', sans-serif", fontSize: 14, lineHeight: 1.6, color: COLORS.silver, paddingLeft: 0, margin: 0, display: 'flex', flexDirection: 'column', gap: 10 },
      code: { fontFamily: "'JetBrains Mono', monospace", fontSize: 12, background: '#F6F7F8', border: `1px solid ${COLORS.line}`, borderRadius: 4, padding: '1px 6px', color: COLORS.ink },
      footer: { display: 'flex', gap: 10, fontFamily: "'JetBrains Mono', monospace", fontSize: 11, letterSpacing: '0.06em', color: COLORS.silver, paddingTop: 24, borderTop: `1px solid ${COLORS.line}`, flexWrap: 'wrap' },
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
